<?xml version="1.0" encoding="ISO-8859-1" ?>
<!DOCTYPE html
    PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="ISO-8859-1" />
    <title>Create Prescription | Hospital NovaCare</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
        /* Global theme (same as others) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #e0f3ff, #f7fbff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #1f2933;
        }

        .page-wrapper {
            width: 100%;
            max-width: 900px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .hospital-name {
            font-size: 2rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #0b7285;
            font-weight: 700;
        }

        .subtitle {
            margin-top: 6px;
            font-size: 0.95rem;
            color: #6c7a89;
        }

        /* Card */
        .card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
            padding: 28px 24px 24px;
            border: 1px solid #edf2f7;
        }

        @media (min-width: 640px) {
            .card {
                padding: 32px 36px 28px;
            }
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: #111827;
        }

        .card-description {
            font-size: 0.9rem;
            color: #6b7280;
            margin-bottom: 18px;
        }

        .form-table {
            width: 100%;
            border-collapse: collapse;
        }

        .form-table td {
            padding: 10px 6px;
            vertical-align: top;
        }

        .form-table td:first-child {
            width: 35%;
            font-size: 0.95rem;
            color: #374151;
            text-align: right;
            padding-right: 14px;
            text-transform: capitalize;
        }

        @media (max-width: 640px) {
            .form-table td:first-child {
                text-align: left;
                padding-right: 0;
                padding-bottom: 4px;
                display: block;
            }

            .form-table tr {
                display: block;
                margin-bottom: 10px;
            }

            .form-table td {
                display: block;
                width: 100%;
            }
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 9px 11px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
            background-color: #f9fafb;
        }

        textarea {
            min-height: 180px;
            resize: vertical;
        }

        input:focus,
        textarea:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.25);
            background-color: #ffffff;
        }

        .button-row {
            text-align: center;
            padding-top: 12px;
        }

        button[type="submit"] {
            padding: 10px 28px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            color: #ffffff;
            font-size: 0.98rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.33);
            transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
        }

        button[type="submit"]:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 30px rgba(37, 99, 235, 0.4);
            opacity: 0.95;
        }

        button[type="submit"]:active {
            transform: translateY(0);
            box-shadow: 0 7px 18px rgba(37, 99, 235, 0.35);
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <!-- Header -->
        <header class="header">
            <div class="hospital-name">Hospital NovaCare</div>
            <div class="subtitle">Doctor Portal Â· Prescriptions</div>
        </header>

        <!-- Card -->
        <section class="card">
            <h1 class="card-title">Create New Prescription</h1>
            <p class="card-description">
                Enter prescription details for the selected appointment.
            </p>

            <form action="#" th:action="@{/savePrescription}" th:object="${prescription}" id="myform">
                <table class="form-table">
                    <tr>
                        <td>Appointment ID</td>
                        <td>
                            <input type="text" th:field="*{appointmentID}" readonly />
                        </td>
                    </tr>
                    <tr>
                        <td>Patient Name</td>
                        <td>
                            <input type="text" th:field="*{patientName}" readonly />
                        </td>
                    </tr>
                    <tr>
                        <td>Prescription Details</td>
                        <td>
                            <textarea th:field="*{description}"
                                placeholder="Enter medicines, dosage, and instructions"></textarea>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2" class="button-row">
                            <button type="submit">Save Prescription</button>
                        </td>
                    </tr>
                </table>
            </form>

        </section>
    </div>
</body>

</html>
