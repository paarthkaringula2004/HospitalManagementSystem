<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="ISO-8859-1">
    <title>Logged In | Hospital NovaCare</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #e0f3ff, #f7fbff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #1f2933;
        }

        .page-wrapper {
            width: 100%;
            max-width: 700px;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .hospital-name {
            font-size: 2rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #0b7285;
            font-weight: 700;
        }

        .subtitle {
            margin-top: 6px;
            font-size: 0.95rem;
            color: #6c7a89;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
            padding: 28px 24px 24px;
            border: 1px solid #edf2f7;
            text-align: center;
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #111827;
        }

        .card-description {
            font-size: 0.95rem;
            color: #6b7280;
            margin-bottom: 20px;
        }

        .nav-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .nav-links a {
            text-decoration: none;
            padding: 9px 16px;
            border-radius: 999px;
            border: 1px solid #0ea5e9;
            background-color: #f0f9ff;
            color: #0369a1;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background-color 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
        }

        .nav-links a:hover {
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            color: #ffffff;
            box-shadow: 0 8px 20px rgba(14, 165, 233, 0.4);
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <header class="header">
            <div class="hospital-name">Hospital NovaCare</div>
            <div class="subtitle">Welcome Back</div>
        </header>

        <section class="card">
            <h1 class="card-title">Login Successful</h1>
            <p class="card-description">
                You are now logged in.
                <br />
                Youâll be redirected automatically to your portal, or click the button below.
            </p>

            <div class="nav-links">
                <!-- This will be Patient / Doctor / Receptionist depending on who logged in -->
                <a th:href="${portalUrl}" th:text="${portalName}">Your Portal</a>

                <!-- Optional: main home always available -->
                <a th:href="@{/}">Main Home</a>
            </div>

            <!-- Auto-redirect after 2 seconds -->
            <script th:inline="javascript">
                /*<![CDATA[*/
                var portalUrl = /*[[${portalUrl}]]*/ "/";
                if (portalUrl) {
                    setTimeout(function () {
                        window.location.href = portalUrl;
                    }, 2000); // 2000 ms = 2 seconds
                }
                /*]]>*/
            </script>

        </section>
    </div>
</body>

</html>
