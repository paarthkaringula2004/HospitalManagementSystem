<!DOCTYPE html SYSTEM "http://www.thymeleaf.org/dtd/xhtml1-strict-thymeleaf-spring4-4.dtd">

<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" content="Cory Sanoy" name="Author" />

    <title>Doctors Event Calendar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- FullCalendar CSS -->
    <link href="http://fullcalendar.io/js/fullcalendar-2.2.5/fullcalendar.css"
        th:href="@{/webjars/fullcalendar/2.2.5/fullcalendar.css}" rel="stylesheet">
    </link>
    <link href="http://fullcalendar.io/js/fullcalendar-2.2.5/fullcalendar.print.css"
        th:href="@{/webjars/fullcalendar/2.2.5/fullcalendar.print.css}" rel="stylesheet" media="print">
    </link>

    <!-- JS libs -->
    <script src="http://cdnjs.cloudflare.com/ajax/libs/moment.js/2.9.0/moment.min.js"
        th:src="@{/webjars/momentjs/2.9.0/min/moment.min.js}" type="text/javascript"></script>
    <script src="http://cdn.jsdelivr.net/webjars/jquery/3.4.1/jquery.min.js"
        th:src="@{/webjars/jquery/3.4.1/jquery.min.js}" type="text/javascript"></script>
    <script src="http://fullcalendar.io/js/fullcalendar-2.2.5/fullcalendar.min.js"
        th:src="@{/webjars/fullcalendar/2.2.5/fullcalendar.min.js}" type="text/javascript"></script>

    <script type="text/javascript">
        $(document).ready(function () {
            $('#calendar').fullCalendar({
                header: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'month,agendaWeek,agendaDay'
                },
                defaultDate: '2019-06-01',
                editable: true,
                eventLimit: true,
                events: {
                    url: '/allevents',
                    type: 'GET'
                }
            });
        });
    </script>

    <style>
        /* Global theme (same as other pages) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #e0f3ff, #f7fbff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #1f2933;
        }

        .page-wrapper {
            width: 100%;
            max-width: 1000px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .hospital-name {
            font-size: 2rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #0b7285;
            font-weight: 700;
        }

        .subtitle {
            margin-top: 6px;
            font-size: 0.95rem;
            color: #6c7a89;
        }

        /* Card container */
        .card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
            padding: 28px 24px 24px;
            border: 1px solid #edf2f7;
        }

        @media (min-width: 640px) {
            .card {
                padding: 32px 36px 28px;
            }
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: #111827;
        }

        .card-description {
            font-size: 0.9rem;
            color: #6b7280;
            margin-bottom: 18px;
        }

        /* Calendar container */
        .calendar-wrapper {
            margin-top: 8px;
        }

        #calendar {
            max-width: 100%;
            margin: 0 auto;
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <!-- Top header -->
        <header class="header">
            <div class="hospital-name">Hospital NovaCare</div>
            <div class="subtitle">Appointment Management System</div>
        </header>

        <!-- Card with calendar -->
        <section class="card">
            <h1 class="card-title">Doctors Event Calendar</h1>
            <p class="card-description">
                View and manage all scheduled doctor events and appointments.
            </p>

            <div class="calendar-wrapper">
                <div id="calendar" th:id="calendar"></div>
            </div>
        </section>
    </div>
</body>

</html>
