<!DOCTYPE html SYSTEM "http://www.thymeleaf.org/dtd/xhtml1-strict-thymeleaf-spring4-4.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" content="Cory Sanoy" name="Author" />
    <title>Doctor Event Calendar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- FullCalendar + jQuery + jQuery UI -->
    <link href="http://cdn.jsdelivr.net/webjars/fullcalendar/2.2.5/fullcalendar.css"
        th:href="@{/webjars/fullcalendar/2.2.5/fullcalendar.css}" rel="stylesheet" />
    <link href="http://cdn.jsdelivr.net/webjars/fullcalendar/2.2.5/fullcalendar.print.css"
        th:href="@{/webjars/fullcalendar/2.2.5/fullcalendar.print.css}" rel="stylesheet" media="print" />

    <script src="http://cdn.jsdelivr.net/webjars/jquery/2.9.0/jquery.min.js"
        th:src="@{/webjars/momentjs/2.9.0/min/moment.min.js}" type="text/javascript"></script>
    <script src="http://cdn.jsdelivr.net/webjars/jquery/3.4.1/jquery.min.js"
        th:src="@{/webjars/jquery/3.4.1/jquery.min.js}" type="text/javascript"></script>
    <script src="http://cdn.jsdelivr.net/webjars/fullcalendar/2.2.5/fullcalendar.min.js"
        th:src="@{/webjars/fullcalendar/2.2.5/fullcalendar.min.js}" type="text/javascript"></script>

    <link rel="stylesheet" href="http//code.jquery.com/ui/1.12.1/themes/smoothness/jquery-ui.css"
        th:href="@{/webjars/jquery-ui/1.12.1/jquery-ui.css}" />
    <script src="http//code.jquery.com/ui/1.12.1/themes/smoothness/jquery-ui.css"
        th:src="@{/webjars/jquery-ui/1.12.1/jquery-ui.js}" type="text/javascript"></script>

    <script type="text/javascript">
        $(function () {
            var dialog, editDialog, form;

            function validateDateRange(start, end) {
                if (!start.isValid()) {
                    alert("Start date is invalid");
                    return false;
                }
                if (!end.isValid()) {
                    alert("End date is invalid");
                    return false;
                }
                if (start.isAfter(end) || start.isSame(end)) {
                    alert("End date must be after start date");
                    return false;
                }
                return true;
            }

            function removeEvent() {
                var eventStart = moment(modstartdateandtime.value);
                var eventEnd = moment(modenddateandtime.value);

                var eventData;
                if (moduid.value) {
                    eventData = {
                        id: moduid.value,
                        title: modtitle.value,
                        start: eventStart,
                        finish: eventEnd,
                        description: moddescription.value
                    };

                    editDialog.dialog("close");

                    $.ajax({
                        type: "DELETE",
                        url: "/event",
                        data: JSON.stringify(eventData),
                        contentType: "application/json; charset=utf-8",
                        dataType: "json",
                        success: function (data) {
                            $('#calendar').fullCalendar('refetchEvents');
                        },
                        failure: function (errMsg) {
                            alert(errMsg);
                        }
                    });
                }
                return true;
            }

            function editEvent(event, elements) {
                var eventStart = moment(event.start).format("YYYY-MM-DDTHH:mm:ss");
                var eventEnd = moment(event.finish).format("YYYY-MM-DDTHH:mm:ss");

                modtitle.value = event.title;
                moddescription.value = event.description;
                modstartdateandtime.value = eventStart;
                modenddateandtime.value = eventEnd;
                moduid.value = event.id;
                editDialog.dialog("open");
            }

            function saveEvent() {
                var valid = true;

                var eventStart = moment(modstartdateandtime.value);
                var eventEnd = moment(modenddateandtime.value);

                valid = valid && modtitle.value;
                valid = valid && modstartdateandtime.value;
                valid = valid && validateDateRange(eventStart, eventEnd);

                if (valid) {
                    var eventData;
                    if (modtitle.value) {
                        eventData = {
                            id: moduid.value,
                            title: modtitle.value,
                            start: eventStart,
                            finish: eventEnd,
                            description: moddescription.value
                        };
                    }
                    $('#calendar').fullCalendar('unselect');

                    editDialog.dialog("close");

                    $.ajax({
                        type: "PATCH",
                        url: "/event",
                        data: JSON.stringify(eventData),
                        contentType: "application/json; charset=utf-8",
                        dataType: "json",
                        success: function (data) {
                            $('#calendar').fullCalendar('refetchEvents');
                        },
                        failure: function (errMsg) {
                            alert(errMsg);
                        }
                    });
                }
                return valid;
            }

            function addEvent() {
                var valid = true;

                var eventStart = moment(startdateandtime.value);
                var eventEnd = moment(enddateandtime.value);

                valid = valid && newtitle.value;
                valid = valid && startdateandtime.value;
                valid = valid && validateDateRange(eventStart, eventEnd);

                if (valid) {
                    var eventData;
                    if (newtitle.value) {
                        eventData = {
                            title: newtitle.value,
                            description: description.value,
                            start: eventStart,
                            finish: eventEnd
                        };
                    }

                    $('#calendar').fullCalendar('unselect');
                    dialog.dialog("close");

                    $.ajax({
                        type: "POST",
                        url: "/event",
                        data: JSON.stringify(eventData),
                        contentType: "application/json; charset=utf-8",
                        dataType: "json",
                        success: function (data) {
                            $('#calendar').fullCalendar('renderEvent', data, true);
                        },
                        failure: function (errMsg) {
                            alert(errMsg);
                        }
                    });
                }
                return valid;
            }

            dialog = $("#dialog-form").dialog({
                autoOpen: false,
                height: 450,
                width: 350,
                modal: true,
                buttons: {
                    "Create": addEvent,
                    "Cancel": function () {
                        dialog.dialog("close");
                    }
                },
                close: function () {
                    form[0].reset();
                }
            });

            editDialog = $("#edit-dialog-form").dialog({
                autoOpen: false,
                height: 450,
                width: 350,
                modal: true,
                buttons: {
                    "Save": saveEvent,
                    "Delete": removeEvent,
                    "Cancel": function () {
                        editDialog.dialog("close");
                    }
                },
                close: function () {
                    form[0].reset();
                }
            });

            form = dialog.find("form").on("submit", function (event) {
                event.preventDefault();
                addEvent();
            });

            $("#create-event").button().on("click", function () {
                dialog.dialog("open");
            });

            $(document).ready(function () {
                $('#calendar').fullCalendar({
                    header: {
                        left: 'prev,next today',
                        center: 'title',
                        right: 'month,agendaWeek,agendaDay'
                    },
                    defaultDate: moment().format("YYYY-MM-DD"),
                    editable: true,
                    eventLimit: true,
                    events: {
                        url: '/findByName',
                        type: 'GET',
                        error: function () {
                            alert('There was an error while fetching events!');
                        }
                    },
                    selectable: true,
                    selectHelper: true,
                    select: function (start, end) {
                        startdateandtime.value = moment(start).format("YYYY-MM-DDTHH:mm:ss");
                        enddateandtime.value = moment(end).format("YYYY-MM-DDTHH:mm:ss");
                        dialog.dialog("open");
                    },
                    eventClick: function (event, element) {
                        editEvent(event, element);
                    },
                    loading: function (bool) {
                        $('#loading').toggle(bool);
                    }
                });
            });
        });
    </script>

    <!-- Global theme & layout (consistent with other pages) -->
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #e0f3ff, #f7fbff);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 20px;
            color: #1f2933;
        }

        #dialog-form,
        #edit-dialog-form {
            display: none;
        }

        .page-wrapper {
            width: 100%;
            max-width: 1100px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .hospital-name {
            font-size: 2rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #0b7285;
            font-weight: 700;
        }

        .subtitle {
            margin-top: 6px;
            font-size: 0.95rem;
            color: #6c7a89;
        }

        /* Card */
        .card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
            padding: 24px 20px 20px;
            border: 1px solid #edf2f7;
        }

        @media (min-width: 640px) {
            .card {
                padding: 32px 32px 28px;
            }
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: #111827;
        }

        .card-description {
            font-size: 0.9rem;
            color: #6b7280;
            margin-bottom: 18px;
        }

        /* Nav links */
        .nav-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 18px;
        }

        .nav-links a {
            text-decoration: none;
            font-size: 0.85rem;
            padding: 7px 14px;
            border-radius: 999px;
            border: 1px solid #0ea5e9;
            color: #0ea5e9;
            background-color: #f0f9ff;
            transition: background-color 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
        }

        .nav-links a:hover {
            background-color: #0ea5e9;
            color: #ffffff;
            box-shadow: 0 6px 16px rgba(14, 165, 233, 0.35);
        }

        /* Calendar container + helpers */
        #script-warning {
            display: none;
            background: #fee2e2;
            border: 1px solid #fecaca;
            padding: 6px 10px;
            margin-bottom: 10px;
            font-size: 0.8rem;
            color: #b91c1c;
        }

        #loading {
            display: none;
            font-size: 0.8rem;
            color: #6b7280;
            margin-bottom: 8px;
        }

        #calendar {
            max-width: 100%;
            margin: 10px auto 0 auto;
        }
    </style>

    <!-- jQuery UI dialog styling override -->
    <style>
        body {
            font-size: 62.5%;
        }

        /* Keep UI sizing */
        label,
        input {
            display: block;
        }

        input.text {
            margin-bottom: 12px;
            width: 100%;
            padding: .4em;
        }

        description {
            margin-bottom: 12px;
            width: 100%;
            padding: .4em;
        }

        fieldset {
            padding: 0;
            border: 0;
            margin-top: 25px;
            height: 200px;
        }

        h1 {
            font-size: 4.2em;
            margin: .6em 0;
        }

        div#events-contain {
            width: 350px;
            margin: 20px 0;
        }

        div#events-contain table {
            margin: 1em 0;
            border-collapse: collapse;
            width: 100%;
        }

        div#events-contain table td,
        div#events-contain table th {
            border: 1px solid #eee;
            padding: .6em 10px;
            text-align: left;
        }

        .ui-dialog .ui-state-error {
            padding: .3em;
        }

        .validateTips {
            border: 1px solid transparent;
            padding: 0.3em;
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <!-- Main header -->
        <header class="header">
            <div class="hospital-name">Hospital NovaCare</div>
            <div class="subtitle">Doctor Event Scheduler</div>
        </header>

        <section class="card">
            <h2 class="card-title">Calendar</h2>
            <p class="card-description">
                Manage your events and appointments directly from the calendar.
            </p>

            <div class="nav-links">
                <a th:href="@{/doctors}">Homepage</a>
            </div>

            <div id="script-warning"></div>
            <div id="loading">Loading events...</div>
            <div id="calendar"></div>
        </section>
    </div>

    <!-- Create Event Dialog -->
    <div id="dialog-form" title="Create new Event">
        <form id="event-form">
            <fieldset>
                <label for="newtitle">Title</label>
                <input type="text" name="newtitle" id="newtitle" value="New Event"
                    class="text ui-widget-content ui-corner-all" />

                <label for="description">Description</label>
                <input type="text" name="description" id="description" value=""
                    class="text ui-widget-content ui-corner-all" />

                <br />

                <label for="startdateandtime">Starts</label>
                <input type="datetime-local" id="startdateandtime" />

                <br />

                <label for="enddateandtime">Ends</label>
                <input type="datetime-local" id="enddateandtime" />
                <input type="hidden" name="uid" id="uid" />

                <input type="submit" tabindex="-1" style="position:absolute; top:-1000px" />
            </fieldset>
        </form>
    </div>

    <!-- Edit Event Dialog -->
    <div id="edit-dialog-form" title="Modify an Event">
        <form id="edit-event-form">
            <fieldset>
                <label for="modtitle">Title</label>
                <input type="text" name="modtitle" id="modtitle" value="New Event"
                    class="text ui-widget-content ui-corner-all" />

                <label for="moddescription">Description</label>
                <input type="text" name="moddescription" id="moddescription" value=""
                    class="text ui-widget-content ui-corner-all" />

                <label for="modstartdateandtime">Starts</label>
                <input type="datetime-local" id="modstartdateandtime" />

                <br />

                <label for="modenddateandtime">Ends</label>
                <input type="datetime-local" id="modenddateandtime" />
                <input type="hidden" name="moduid" id="moduid" />

                <input type="submit" tabindex="-1" style="position:absolute; top:-1000px" />
            </fieldset>
        </form>
    </div>
</body>

</html>
