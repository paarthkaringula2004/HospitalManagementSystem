<?xml version="1.0" encoding="ISO-8859-1" ?>
<!DOCTYPE html
    PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="ISO-8859-1" />
    <title>Today's Appointments</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #e0f3ff, #f7fbff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #1f2933;
        }

        .page-wrapper {
            width: 100%;
            max-width: 1100px;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .hospital-name {
            font-size: 2rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #0b7285;
            font-weight: 700;
        }

        .subtitle {
            margin-top: 6px;
            font-size: 0.95rem;
            color: #6c7a89;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
            padding: 32px 36px 28px;
            border: 1px solid #edf2f7;
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: #111827;
        }

        .card-description {
            font-size: 0.9rem;
            color: #6b7280;
            margin-bottom: 18px;
        }

        .nav-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 18px;
        }

        .nav-links a {
            text-decoration: none;
            font-size: 0.85rem;
            padding: 7px 14px;
            border-radius: 999px;
            border: 1px solid #0ea5e9;
            color: #0ea5e9;
            background-color: #f0f9ff;
            transition: all 0.15s ease;
        }

        .nav-links a:hover {
            background-color: #0ea5e9;
            color: #fff;
            box-shadow: 0 6px 16px rgba(14, 165, 233, 0.35);
        }

        .data-table-wrapper {
            overflow-x: auto;
            margin-top: 10px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 12px;
            overflow: hidden;
            font-size: 0.92rem;
        }

        .data-table thead {
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            color: #fff;
        }

        .data-table th,
        .data-table td {
            padding: 10px 14px;
            text-align: left;
            white-space: nowrap;
        }

        .data-table tbody tr:nth-child(even) {
            background-color: #f9fafb;
        }

        .data-table tbody tr:nth-child(odd) {
            background-color: #fff;
        }

        .data-table tbody tr:hover {
            background-color: #e0f2fe;
        }

        .btn-prescribe {
            font-size: 0.85rem;
            padding: 4px 10px;
            color: #fff;
            background-color: #0ea5e9;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
        }

        .btn-prescribe:hover {
            background-color: #0284c7;
        }

        .status-pill {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 0.78rem;
            background-color: #ecfdf3;
            color: #166534;
        }

        .status-dash {
            color: #9ca3af;
            font-size: 0.85rem;
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <header class="header">
            <div class="hospital-name">Hospital NovaCare</div>
            <div class="subtitle">Appointment Management System</div>
        </header>

        <section class="card">
            <h1 class="card-title">Today's Appointments</h1>
            <p class="card-description">
                List of all appointments with their prescription status.
            </p>

            <div class="nav-links">
                <a th:href="@{/doctors}">Homepage</a>
            </div>

            <div class="data-table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Appointment ID</th>
                            <th>Patient Name</th>
                            <th>Date</th>
                            <th>Prescription</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="appointment : ${appointments}">
                            <td th:text="${appointment.appointment_id}"></td>
                            <td th:text="${appointment.patientName}"></td>
                            <td th:text="${appointment.date}"></td>
                            <td>
                                <!-- If prescription not given -->
                                <span
                                    th:if="${appointment.prescription == null or #strings.isEmpty(appointment.prescription)}">
                                    <a th:href="@{'/addPrescription'(appointmentID=${appointment.appointment_id}, patientName=${appointment.patientName})}"
                                        class="btn-prescribe">Prescribe</a>
                                </span>

                                <!-- If already prescribed -->
                                <span
                                    th:unless="${appointment.prescription == null or #strings.isEmpty(appointment.prescription)}"
                                    class="status-pill">Prescribed</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>
</body>

</html>
