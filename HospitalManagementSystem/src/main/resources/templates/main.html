<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="ISO-8859-1" />
    <title>Welcome | Hospital NovaCare</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
        /* Global theme (same as other pages) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #e0f3ff, #f7fbff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #1f2933;
        }

        .page-wrapper {
            width: 100%;
            max-width: 900px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .hospital-name {
            font-size: 2rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #0b7285;
            font-weight: 700;
        }

        .subtitle {
            margin-top: 6px;
            font-size: 0.95rem;
            color: #6c7a89;
        }

        /* Card */
        .card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
            padding: 28px 24px 24px;
            border: 1px solid #edf2f7;
            text-align: center;
        }

        @media (min-width: 640px) {
            .card {
                padding: 32px 36px 28px;
            }
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #111827;
        }

        .card-description {
            font-size: 0.95rem;
            color: #6b7280;
            margin-bottom: 22px;
        }

        /* Main nav buttons */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 14px;
        }

        .nav-grid a {
            display: inline-block;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 999px;
            border: 1px solid #0ea5e9;
            background-color: #f0f9ff;
            color: #0369a1;
            font-size: 0.95rem;
            font-weight: 500;
            transition: background-color 0.15s ease, color 0.15s ease, box-shadow 0.15s ease,
                transform 0.12s ease;
        }

        .nav-grid a:hover {
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            color: #ffffff;
            box-shadow: 0 10px 24px rgba(14, 165, 233, 0.4);
            transform: translateY(-1px);
        }

        /* Alerts */
        .alert {
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 0.85rem;
            display: inline-block;
            margin-top: 10px;
        }

        .alert-success {
            background-color: #ecfdf3;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .alert-danger,
        .alert-error {
            background-color: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <!-- Header -->
        <header class="header">
            <div class="hospital-name">Hospital NovaCare</div>
            <div class="subtitle">Welcome to the Hospital Management System</div>
        </header>

        <!-- Main card -->
        <section class="card">
            <h1 class="card-title">Welcome</h1>
            <p class="card-description">
                Please choose your portal to log in or sign up.
            </p>

            <!-- main.html (FIXED) -->
            <div class="nav-grid">
                <a th:href="@{/login}">Patient Login</a>
                <a th:href="@{/login}">Doctor Login</a>
                <a th:href="@{/login}">Receptionist Login</a>
                <a th:href="@{/signup}">Patient Sign Up</a>
            </div>


            <div th:if="${message}" th:text="${message}" th:class="${'alert ' + alertClass}">
            </div>
        </section>
    </div>
</body>

</html>
