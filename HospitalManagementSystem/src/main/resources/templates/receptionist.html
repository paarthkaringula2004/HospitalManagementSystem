<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="ISO-8859-1">
    <title>Receptionist | Hospital NovaCare</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
        /* Global theme (same as other pages) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #e0f3ff, #f7fbff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #1f2933;
        }

        .page-wrapper {
            width: 100%;
            max-width: 900px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .hospital-name {
            font-size: 2rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #0b7285;
            font-weight: 700;
        }

        .subtitle {
            margin-top: 6px;
            font-size: 0.95rem;
            color: #6c7a89;
        }

        /* Card */
        .card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
            padding: 28px 24px 24px;
            border: 1px solid #edf2f7;
        }

        @media (min-width: 640px) {
            .card {
                padding: 32px 36px 28px;
            }
        }

        .top-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 12px;
            align-items: center;
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #111827;
        }

        .card-body-text {
            font-size: 0.95rem;
            color: #374151;
            margin-bottom: 18px;
        }

        .username {
            font-weight: 600;
            color: #0b7285;
        }

        /* Logout button */
        .logout-form {
            margin: 0;
        }

        .logout-button {
            padding: 7px 16px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            color: #ffffff;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(239, 68, 68, 0.35);
            transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
        }

        .logout-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(239, 68, 68, 0.45);
            opacity: 0.95;
        }

        /* Nav links */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
            margin-bottom: 16px;
        }

        .nav-grid a {
            text-decoration: none;
            text-align: center;
            padding: 9px 16px;
            border-radius: 999px;
            border: 1px solid #0ea5e9;
            background-color: #f0f9ff;
            color: #0369a1;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background-color 0.15s ease, color 0.15s ease, box-shadow 0.15s ease,
                transform 0.12s ease;
        }

        .nav-grid a:hover {
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            color: #ffffff;
            box-shadow: 0 10px 24px rgba(14, 165, 233, 0.4);
            transform: translateY(-1px);
        }

        /* Alerts */
        .alert {
            margin-top: 12px;
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 0.85rem;
            display: inline-block;
        }

        .alert-success {
            background-color: #ecfdf3;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .alert-danger,
        .alert-error {
            background-color: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <!-- Header -->
        <header class="header">
            <div class="hospital-name">Hospital NovaCare</div>
            <div class="subtitle">Receptionist Portal</div>
        </header>

        <!-- Card -->
        <section class="card">
            <div class="top-actions">
                <div class="card-title">Receptionist Dashboard</div>
                <form class="logout-form" action="#" th:action="@{/logout}" method="post">
                    <input class="logout-button" type="submit" value="Logout" />
                </form>
            </div>

            <p class="card-body-text">
                Hello, <span class="username" th:text="${username}"></span>
            </p>

            <div class="nav-grid">
                <a th:href="@{/receptionist/receptionistAppointments}">Manage Appointments</a>
                <a th:href="@{/receptionist/receptionistSchedule}">View Schedules</a>
                <a th:href="@{/receptionist/createInvoice}">Create Invoice</a>
            </div>


            <div th:if="${message}" th:text="${message}" th:class="${'alert ' + alertClass}">
            </div>
        </section>
    </div>
</body>

</html>
