<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="ISO-8859-1">
    <title>Doctors Event</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* Global styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #e0f3ff, #f7fbff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #1f2933;
        }

        .page-wrapper {
            width: 100%;
            max-width: 1000px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .hospital-name {
            font-size: 2rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #0b7285;
            font-weight: 700;
        }

        .subtitle {
            margin-top: 6px;
            font-size: 0.95rem;
            color: #6c7a89;
        }

        /* Card container */
        .card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
            padding: 28px 24px 24px;
            border: 1px solid #edf2f7;
        }

        @media (min-width: 640px) {
            .card {
                padding: 32px 36px 28px;
            }
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: #111827;
        }

        .card-description {
            font-size: 0.9rem;
            color: #6b7280;
            margin-bottom: 18px;
        }

        /* Table styling */
        .data-table-wrapper {
            overflow-x: auto;
            margin-top: 10px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 12px;
            overflow: hidden;
            font-size: 0.92rem;
        }

        .data-table thead {
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            color: #ffffff;
        }

        .data-table th,
        .data-table td {
            padding: 10px 14px;
            text-align: left;
            white-space: nowrap;
        }

        .data-table tbody tr:nth-child(even) {
            background-color: #f9fafb;
        }

        .data-table tbody tr:nth-child(odd) {
            background-color: #ffffff;
        }

        .data-table tbody tr:hover {
            background-color: #e0f2fe;
        }

        .empty-message {
            margin-top: 14px;
            font-size: 0.9rem;
            color: #9ca3af;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <!-- Top header -->
        <header class="header">
            <div class="hospital-name">Hospital NovaCare</div>
            <div class="subtitle">Appointment Management System</div>
        </header>

        <!-- Card with appointments table -->
        <section class="card">
            <h1 class="card-title">Your Appointments</h1>
            <p class="card-description">
                Below is the list of scheduled appointments.
            </p>

            <div class="data-table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Appointment ID</th>
                            <th>Patient Name</th>
                            <th>Doctor Name</th>
                            <th>Appointment Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="appointment : ${listAppointments}">
                            <td th:text="${appointment.appointment_id}"></td>
                            <td th:text="${appointment.patientName}"></td>
                            <td th:text="${appointment.doctorName}"></td>
                            <td th:text="${appointment.date}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Optional: show this only when list is empty (if you handle it in Thymeleaf) -->
            <!--
        <p class="empty-message" th:if="${#lists.isEmpty(listAppointments)}">
            No appointments found.
        </p>
        -->
        </section>
    </div>
</body>

</html>
