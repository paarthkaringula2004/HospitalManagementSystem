<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="ISO-8859-1">
    <title>Receptionist | Appointments</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
        /* Global theme */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #e0f3ff, #f7fbff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #1f2933;
        }

        .page-wrapper {
            width: 100%;
            max-width: 1100px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .hospital-name {
            font-size: 2rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #0b7285;
            font-weight: 700;
        }

        .subtitle {
            margin-top: 6px;
            font-size: 0.95rem;
            color: #6c7a89;
        }

        /* Card */
        .card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
            padding: 28px 24px 24px;
            border: 1px solid #edf2f7;
        }

        @media (min-width: 640px) {
            .card {
                padding: 32px 36px 28px;
            }
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: #111827;
        }

        .card-description {
            font-size: 0.9rem;
            color: #6b7280;
            margin-bottom: 18px;
        }

        /* Nav link */
        .nav-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 18px;
        }

        .nav-links a {
            text-decoration: none;
            font-size: 0.85rem;
            padding: 7px 14px;
            border-radius: 999px;
            border: 1px solid #0ea5e9;
            color: #0ea5e9;
            background-color: #f0f9ff;
            transition: background-color 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
        }

        .nav-links a:hover {
            background-color: #0ea5e9;
            color: #ffffff;
            box-shadow: 0 6px 16px rgba(14, 165, 233, 0.35);
        }

        /* Alerts */
        .alert {
            margin: 0 auto 10px auto;
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 0.85rem;
            display: inline-block;
        }

        .alert-success {
            background-color: #ecfdf3;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .alert-danger,
        .alert-error {
            background-color: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }

        /* Table */
        .data-table-wrapper {
            overflow-x: auto;
            margin-top: 6px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 12px;
            overflow: hidden;
            font-size: 0.92rem;
        }

        .data-table thead {
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            color: #ffffff;
        }

        .data-table th,
        .data-table td {
            padding: 10px 14px;
            text-align: left;
            white-space: nowrap;
        }

        .data-table tbody tr:nth-child(even) {
            background-color: #f9fafb;
        }

        .data-table tbody tr:nth-child(odd) {
            background-color: #ffffff;
        }

        .data-table tbody tr:hover {
            background-color: #e0f2fe;
        }

        .table-caption {
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: #374151;
        }

        /* Confirm button */
        .confirm-form {
            margin: 0;
        }

        .confirm-button {
            padding: 6px 12px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #ffffff;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 6px 14px rgba(34, 197, 94, 0.35);
            transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.12s ease;
        }

        .confirm-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(34, 197, 94, 0.45);
            opacity: 0.97;
        }

        .status-pill {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.78rem;
            background-color: #ecfdf3;
            color: #166534;
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <!-- Header -->
        <header class="header">
            <div class="hospital-name">Hospital NovaCare</div>
            <div class="subtitle">Receptionist Portal Â· Appointments</div>
        </header>

        <!-- Card -->
        <section class="card">
            <h1 class="card-title">Appointments</h1>
            <p class="card-description">
                View and confirm patient appointments.
            </p>

            <div class="nav-links">
                <a th:href="@{/receptionist}">Homepage</a>
            </div>

            <div style="text-align:center; margin-bottom:10px;">
                <div th:if="${message}" th:text="${message}" th:class="${'alert ' + alertClass}">
                </div>
            </div>

            <div class="data-table-wrapper">
                <div class="table-caption">All appointments</div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Appointment ID</th>
                            <th>Patient Name</th>
                            <th>Doctor Name</th>
                            <th>Appointment Date</th>
                            <th>Confirmation</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="appointment : ${listAppointments}">
                            <td th:text="${appointment.appointment_id}"></td>
                            <td th:text="${appointment.patientName}"></td>
                            <td th:text="${appointment.doctorName}"></td>
                            <td th:text="${appointment.date}"></td>
                            <td>
                                <div th:if="${appointment.confirmed != 'confirmed'}">
                                    <form class="confirm-form" action="#" th:action="@{/confirmm}">
                                        <input class="confirm-button" type="submit" value="Click to confirm" />
                                    </form>
                                </div>
                                <span th:if="${appointment.confirmed == 'confirmed'}" class="status-pill">
                                    Confirmed
                                </span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>
</body>

</html>
