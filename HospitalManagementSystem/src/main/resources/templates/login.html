<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title>Login | Hospital NovaCare</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #e0f3ff, #f7fbff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #1f2933;
        }

        .page-wrapper {
            width: 100%;
            max-width: 420px;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .hospital-name {
            font-size: 2rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #0b7285;
            font-weight: 700;
        }

        .subtitle {
            margin-top: 6px;
            font-size: 0.95rem;
            color: #6c7a89;
        }

        .card {
            position: relative;
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.1);
            padding: 26px 22px 24px;
            border: 1px solid #e5e7eb;
        }

        .card-topbar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 7px;
            border-radius: 18px 18px 0 0;
            background-image: linear-gradient(to right,
                    #0ea5e9, #0ea5e9 18%,
                    #22c55e 18%, #22c55e 36%,
                    #f97316 54%, #6366f1 90%, #0ea5e9 100%);
        }

        .card-title {
            margin-top: 6px;
            margin-bottom: 4px;
            font-size: 1.4rem;
            font-weight: 600;
            color: #111827;
        }

        .card-subtitle {
            font-size: 0.9rem;
            color: #6b7280;
            margin-bottom: 18px;
        }

        .field-group {
            margin-bottom: 14px;
        }

        .field-label {
            font-size: 0.82rem;
            font-weight: 500;
            color: #4b5563;
            margin-bottom: 4px;
            display: block;
        }

        .input {
            width: 100%;
            padding: 10px 12px;
            font-size: 0.95rem;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            background-color: #f9fafb;
            outline: none;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
        }

        .input:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.28);
            background-color: #ffffff;
        }

        .login-button {
            margin-top: 6px;
            width: 100%;
            padding: 11px 18px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(135deg, #0ea5e9, #22c55e);
            color: #ffffff;
            font-size: 0.98rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 12px 30px rgba(34, 197, 94, 0.35);
            transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
        }

        .login-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 16px 36px rgba(34, 197, 94, 0.45);
            opacity: 0.97;
        }

        .login-button:active {
            transform: translateY(0);
            box-shadow: 0 9px 22px rgba(34, 197, 94, 0.4);
        }

        .signup-hint {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #9ca3af;
            text-align: center;
        }

        .signup-hint a {
            color: #0ea5e9;
            text-decoration: none;
            font-weight: 500;
        }

        .signup-hint a:hover {
            text-decoration: underline;
        }

        .alert {
            margin-top: 10px;
            padding: 7px 10px;
            border-radius: 999px;
            font-size: 0.8rem;
            text-align: center;
        }

        .alert-error {
            background-color: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <header class="header">
            <div class="hospital-name">Hospital NovaCare</div>
            <div class="subtitle">Secure access for doctors, patients & staff</div>
        </header>

        <section class="card">
            <div class="card-topbar"></div>

            <h1 class="card-title">Sign in</h1>
            <p class="card-subtitle">
                Use your hospital account credentials to continue.
            </p>

            <!-- Spring Security default login processing URL = /login -->
            <form th:action="@{/login}" method="post">
                <div class="field-group">
                    <label class="field-label" for="username">Username</label>
                    <input id="username" name="username" type="text" class="input" placeholder="Enter your username"
                        required />
                </div>

                <div class="field-group">
                    <label class="field-label" for="password">Password</label>
                    <input id="password" name="password" type="password" class="input" placeholder="Enter your password"
                        required />
                </div>

                <button type="submit" class="login-button">Sign in</button>

                <!-- Optional error message if ?error is set -->
                <div th:if="${param.error}" class="alert alert-error">
                    Invalid username or password.
                </div>

                <p class="signup-hint">
                    New patient?
                    <a th:href="@{/signup}">Create an account</a>
                </p>
            </form>
        </section>
    </div>
</body>

</html>
